name: Release RMSKIN

on:
  push:
    tags:
      - 'v*'

# Add permissions so the token can create a release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create RMSKIN Structure
        run: |
          mkdir -p build/Skins/rainmeter-todo
          cp -r @Resources todo build/Skins/rainmeter-todo/
          
          # Create RMSKIN.ini with Windows CRLF line endings
          python -c "
with open('build/RMSKIN.ini', 'w', encoding='utf-16') as f:
    f.write('[rmskin]\nName=rainmeter todo skin\nAuthor=Yaro Sazonov\nVersion=${{ github.ref_name }}\nLoadType=Skin\nLoad=rainmeter-todo\todo\todo.ini\nMinimumRainmeter=4.0.0.0\n'.replace('\n', '\r\n'))
"
          
      - name: Package RMSKIN
        run: |
          cd build
          zip -r ../rainmeter-todo-${{ github.ref_name }}.rmskin RMSKIN.ini Skins/
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rainmeter-todo-${{ github.ref_name }}.rmskin
          generate_release_notes: true
