name: Release RMSKIN

on:
  push:
    tags:
      - 'v*'

# Add permissions so the token can create a release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create RMSKIN Structure
        run: |
          mkdir -p build/Skins/rainmeter-todo-yaro
          cp -r @Resources todo build/Skins/rainmeter-todo-yaro/
          
          # Create RMSKIN.ini safely
          cat << 'EOF' > build/RMSKIN.ini
          [rmskin]
          Name=Rainmeter To-Do (Yaro)
          Author=Yaro Sazonov
          Version=__VERSION__
          LoadType=Skin
          Load=rainmeter-todo-yaro\todo\todo.ini
          MinimumRainmeter=4.0.0.0
          EOF
          
          # Inject version
          sed -i "s/__VERSION__/${{ github.ref_name }}/" build/RMSKIN.ini
          
      - name: Package RMSKIN
        id: builder
        uses: 2bndy5/rmskin-action@v2.0.4
        with:
          path: build
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.rmskin"
          generate_release_notes: true
