name: Release RMSKIN

on:
  push:
    tags:
      - 'v*'

# Add permissions so the token can create a release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create RMSKIN Structure
        run: |
          mkdir -p build/Skins/rainmeter-todo
          cp -r @Resources todo build/Skins/rainmeter-todo/
          
          # Create RMSKIN.ini safely
          cat << 'EOF' > build/RMSKIN.ini
          [rmskin]
          Name=rainmeter todo skin
          Author=Yaro Sazonov
          Version=__VERSION__
          LoadType=Skin
          Load=rainmeter-todo\todo\todo.ini
          MinimumRainmeter=4.0.0.0
          EOF
          
          # Inject version and convert to Windows CRLF line endings
          sed -i "s/__VERSION__/${{ github.ref_name }}/" build/RMSKIN.ini
          sed -i 's/$/\r/' build/RMSKIN.ini
          
      - name: Package RMSKIN
        run: |
          cd build
          zip -r ../rainmeter-todo-${{ github.ref_name }}.rmskin RMSKIN.ini Skins/
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rainmeter-todo-${{ github.ref_name }}.rmskin
          generate_release_notes: true
